# Vault Python Client Application Configuration
# 이 파일을 수정하여 Vault 연결 설정을 변경할 수 있습니다.

[vault]
# Entity 이름 (필수)
entity = my-vault-app
# Vault 서버 주소
url = http://127.0.0.1:8200
# Vault 네임스페이스 (선택사항)
namespace = 
# AppRole 인증 정보 (필수)
role_id = 4060cafc-6cda-3bb4-a690-63177f9a5bc6
secret_id = eb42c8b7-ab3c-8c13-a428-3f825a24e8ae

[kv_secret]
# KV Secret 설정
enabled = true
path = database
refresh_interval = 5

[database_dynamic]
# Database Dynamic Secret 설정
enabled = true
role_id = db-demo-dynamic

[database_static]
# Database Static Secret 설정
enabled = true
role_id = db-demo-static

[http]
# HTTP 요청 타임아웃 (초)
timeout = 30
# 최대 응답 크기 (바이트)
max_response_size = 4096
