# Vault C# Client Application Configuration
# 이 파일을 수정하여 Vault 연결 설정을 변경할 수 있습니다.

[vault]
# Entity 이름 (필수) - Vault에 등록된 애플리케이션 엔티티 이름
entity = my-vault-app
# Vault 서버 주소
url = http://127.0.0.1:8200
# Vault 네임스페이스 (선택사항) - Enterprise 환경에서만 사용, 없으면 빈값으로 둡니다
namespace = 
# AppRole 인증 정보 (필수)
role_id = 
secret_id = 

[kv_secret]
# KV Secret 설정
enabled = true
# 시크릿 경로 (마운트 포인트 제외, 예: database → {entity}-kv/data/database)
path = database
# 갱신 간격 (초)
refresh_interval = 5

[database_dynamic]
# Database Dynamic Secret 설정
enabled = true
# Vault에 등록된 Database 역할 이름
role_id = db-demo-dynamic

[database_static]
# Database Static Secret 설정
enabled = true
# Vault에 등록된 Database 역할 이름
role_id = db-demo-static

[http]
# HTTP 요청 타임아웃 (초)
timeout = 30
# 최대 응답 크기 (바이트)
max_response_size = 10485760
