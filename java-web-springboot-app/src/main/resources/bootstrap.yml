spring:
  application:
    name: vault-web-app
  cloud:
    vault:
      authentication: APPROLE
      app-role:
        role-id: 4060cafc-6cda-3bb4-a690-63177f9a5bc6
        secret-id: 6f42ffc4-1627-0b60-7ed5-643b02ec4e99
      host: 127.0.0.1
      port: 8200
      scheme: http
      fail-fast: true
      kv:
        enabled: false
      config:
        lifecycle:
          enabled: true
          min-renewal: 5s
          expiry-threshold: 10s
      generic:
        enabled: false
      database:
        enabled: true
        role: db-demo-dynamic
        backend: my-vault-app-database
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mydb
