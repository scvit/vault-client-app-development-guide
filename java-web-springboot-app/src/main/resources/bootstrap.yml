spring:
  application:
    name: vault-web-app
  cloud:
    vault:
      authentication: APPROLE
      app-role:
        role-id: ec993268-3045-0145-f847-5145e5be9fba
        secret-id: e42e1b3e-1643-2916-2193-89cc312cd750
      host: 127.0.0.1
      port: 8200
      scheme: http
      fail-fast: true
      kv:
        enabled: false
      config:
        lifecycle:
          enabled: true
          min-renewal: 5s
          expiry-threshold: 10s
      generic:
        enabled: false
      database:
        enabled: true
        role: db-demo-dynamic
        backend: my-vault-app-database
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mydb
