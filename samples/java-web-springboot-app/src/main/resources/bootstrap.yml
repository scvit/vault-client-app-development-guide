spring:
  application:
    name: vault-web-app
  cloud:
    vault:
      # namespace: ns1  # namespace가 필요한 경우 주석 해제
      authentication: APPROLE
      app-role:
        role-id: 509358df-2231-bc00-bc05-b26d662db5b8
        secret-id: 21e3fdae-7a6e-52f0-0aca-f1d0768bef06
      host: 127.0.0.1
      port: 8200
      scheme: http
      fail-fast: true
      kv:
        enabled: false
      config:
        lifecycle:
          enabled: true
          min-renewal: 5s
          expiry-threshold: 10s
      generic:
        enabled: false
      database:
        enabled: true
        role: db-demo-dynamic
        backend: my-vault-app-database
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mydb
